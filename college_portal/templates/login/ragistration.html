{% extends "user/base.html" %} {% block content %}

<div
  class="container-fluid d-flex align-items-center justify-content-center"
  style="min-height: 90vh"
>
  <div class="col-11 col-sm-8 col-md-6 col-lg-4 col-xl-3">
    <div class="card border-0 shadow-lg" style="border-radius: 1rem">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div
            class="bg-primary text-white d-inline-block rounded-circle p-3 mb-2"
          >
            <i class="bi bi-person-fill" style="font-size: 2rem"></i>
          </div>
          <h2 class="fw-bold mb-1">Login</h2>
          <p class="text-muted small">Access your account securely</p>
        </div>

        <form method="POST" autocomplete="off">
          {% csrf_token %}

          <div class="form-floating mb-3">
            <input
              type="text"
              name="username"
              class="form-control"
              id="username"
              placeholder="Username"
              required
            />
            <label for="username">Username</label>
          </div>

          <div class="form-floating mb-3">
            <input
              type="email"
              name="email"
              class="form-control"
              id="email"
              placeholder="email"
              required
            />
            <label for="email">Email</label>
          </div>

          <!-- Password Field -->
          <div class="form-floating mb-3">
            <input
              type="password"
              name="password"
              class="form-control"
              id="password"
              placeholder="Password"
              required
            />
            <label for="password">Password</label>
          </div>

          <!-- Show Password Checkbox -->
          <div class="form-check mb-3">
            <input
              type="checkbox"
              class="form-check-input"
              onclick="showPassword()"
              id="showPass"
            />
            <label class="form-check-label" for="showPass">
              Show Password
            </label>
          </div>

          <!-- JavaScript -->
          <script>
            function showPassword() {
              var x = document.getElementById("password");

              if (x.type === "password") {
                x.type = "text";
              } else {
                x.type = "password";
              }
            }
          </script>
          

          <div class="d-grid gap-2 mt-4">
            <button
              type="submit"
              class="btn btn-primary btn-lg rounded-pill shadow-sm"
            >
              Sign In
            </button>
          </div>
          <p class="text-center mt-3">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
